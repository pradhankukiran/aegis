##
## Aegis strfry relay config.
## Sensible portfolio-demo defaults: open relay, lenient PoW, conservative limits.
## See https://github.com/hoytech/strfry/blob/master/strfry.conf for the upstream reference.
##

db = "./strfry-db/"

dbParams {
    maxreaders = 256
    mapsize    = 10995116277760  # 10 TiB sparse — actual size grows with use.
    noReadAhead = false
}

events {
    maxEventSize = 65536       # bytes
    rejectEventsNewerThanSeconds = 900           # 15 min clock skew
    rejectEventsOlderThanSeconds = 94608000      # ~3 years
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 1024000          # raise file-descriptor limit
    realIpHeader = "x-forwarded-for"

    info {
        name = "Aegis Relay"
        description = "Aegis Nostr relay — one of three transports. https://aegis.app"
        pubkey = ""
        contact = "admin@aegis.app"
    }

    maxWebsocketPayloadSize = 131072  # 128 KiB
    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxSubsPerConnection = 200

    writePolicy {
        plugin = ""              # no plugin — open relay for portfolio demo
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = true
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }
}
