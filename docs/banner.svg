<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Aegis — decentralized everything-app">
  <!-- Brutalist hard offset shadow -->
  <rect x="10" y="10" width="1188" height="308" fill="#000000"/>
  <!-- Main card -->
  <rect x="0" y="0" width="1188" height="308" fill="#FFFFFF" stroke="#000000" stroke-width="6"/>

  <!-- Angular shield mark, filled with the Aegis main blue -->
  <g transform="translate(96, 88)">
    <path
      d="M 72 0 L 0 30 L 0 84 L 72 144 L 144 84 L 144 30 Z"
      fill="#88AAEE"
      stroke="#000000"
      stroke-width="6"
      stroke-linejoin="miter"
      stroke-linecap="square"
    />
  </g>

  <!-- AEGIS wordmark -->
  <text
    x="296"
    y="195"
    font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, 'DejaVu Sans Mono', Consolas, 'Courier New', monospace"
    font-size="178"
    font-weight="900"
    fill="#000000"
    letter-spacing="-8"
  >AEGIS</text>

  <!-- Brutalist tagline strip -->
  <g transform="translate(296, 220)">
    <rect x="0" y="0" width="804" height="40" fill="#88AAEE" stroke="#000000" stroke-width="4"/>
    <text
      x="16"
      y="27"
      font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Consolas, 'Courier New', monospace"
      font-size="17"
      font-weight="800"
      fill="#000000"
      letter-spacing="3.5"
    >DECENTRALIZED · 7 FEATURES · 2 NETWORKS · 1 KEYPAIR</text>
  </g>

  <!-- Top-right monospace meta strip -->
  <text
    x="1168"
    y="48"
    font-family="ui-monospace, 'SF Mono', monospace"
    font-size="14"
    font-weight="700"
    fill="#000000"
    letter-spacing="2"
    text-anchor="end"
  >E2E · ZERO-KNOWLEDGE · FEDERATED</text>
</svg>
